<!DOCTYPE html>
<html lang="en">
<head>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course - Hot Beans Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-box">
            <a href="index.html"><img src="Images/Bean.PNG" alt="company logo"></a>
        </div>
        <nav>
            <ul class="navbar">
                <li><a href="index.html">Home</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="eligibility.html">Eligibility</a></li>
                <li><a href="form.html" class="active">Form</a></li>
                <li><a href="course.html">Course</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="page-title-box">Application Form</div>

        <div class="form-container">
            <form id="applicationForm" action="https://formsubmit.co/20038448@student.lambeth.ac.uk" method="POST">
                
                <div class="input-row">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" name="fname" placeholder="Jane" required maxlength="25">
                </div>

                <div class="input-row">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" name="lname" placeholder="Smith" required maxlength="25">
                </div>

                <div class="input-row">
                    <label for="birthday">Birthday</label>
                    <input type="date" id="birthday" name="birthday" required>
                </div>

                <div class="input-row">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                </div>

                <div class="input-row">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select gender option</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="input-row">
                    <label for="position">Available Positions</label>
                    <select name="position" id="position" required>
                        <option value="">Select a role...</option>
                        <option value="Front End Developer">Junior Front End Developer</option>
                        <option value="Back End Developer">Junior Back End Developer</option>
                        <option value="Database Developer">Junior Database Developer</option>
                    </select>
                </div>

                <div class="action-buttons">
                    <button type="submit" class="btn-submit">Submit</button>
                    <button type="reset" class="btn-clear">Clear</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 - Hot Beans Web, Inc. All rights reserved. Address Details Here</p>
        <p>Item 1  |  Item 2  |  Item 3</p>
    </footer>

    <script src="form.js"></script>
</body>
</html>
